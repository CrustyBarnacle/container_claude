# =============================================================================
# tinyproxy.conf — Claude Code egress proxy
# =============================================================================
# Minimal allowlist proxy for the claudecode Podman container.
# Runs on-demand as the host user — no root, no system service.
# Started/stopped automatically by the claude-sandbox launcher.
#
# Only allows HTTPS CONNECT tunnel to explicitly listed domains.
# All other outbound connections from the container are rejected.
#
# Network note:
#   pasta (rootless Podman network backend) shares the host's LAN interface
#   with the container — the container appears on the network as the host LAN
#   IP. The launcher derives this IP dynamically at runtime and injects it via
#   sed before starting tinyproxy. The ALLOW_HOST_IP placeholder below is
#   replaced by the launcher — do not edit it manually.
# =============================================================================

# --- Network ---
# Listen on all interfaces so the container can reach us via pasta.
# Connections are still restricted by the Allow list below.
Port 8888
Listen 0.0.0.0

# Allow connections from:
#   127.0.0.1 / ::1  — host loopback
#   ALLOW_HOST_IP    — replaced at runtime by launcher with host LAN IP
#                      (pasta shares host LAN IP with container)
Allow 127.0.0.1
Allow ::1
Allow ALLOW_HOST_IP

# Only allow HTTPS (port 443) CONNECT tunnels — Claude Code is HTTPS-only
ConnectPort 443

# --- Process ---
# No User/Group directives — run as the invoking user
PidFile "/tmp/claude-sandbox-tinyproxy.pid"

# --- Logging ---
# LogLevel Connect logs each connection attempt (allowed and denied)
LogFile "/tmp/claude-sandbox-tinyproxy.log"
LogLevel Connect

# --- Timeouts ---
Timeout 600
MaxClients 10

# --- Domain allowlist ---
# FilterDefaultDeny: deny everything NOT in the filter file (allowlist mode).
# Build-time domains (downloads.claude.ai) are intentionally excluded.
Filter "/tmp/claude-sandbox-tinyproxy.filter"
FilterDefaultDeny Yes

# --- Misc ---
ViaProxyName "tinyproxy"
